<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Sibling — The Kid Coding Class</title>
    <meta name="description" content="Add a sibling to the same Kid Coding Class live cohort.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'boogaloo': ['Boogaloo', 'cursive'],
                        'quicksand': ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        'brand-purple': '#7F77DD',
                        'brand-coral': '#D85A30',
                        'brand-yellow': '#FAC765',
                        'brand-teal': '#1D9E75',
                        'brand-cream': '#FFF9F0',
                        'brand-dark': '#2D2A4A',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Quicksand', sans-serif; }
        .font-boogaloo { font-family: 'Boogaloo', cursive; }
        .btn-bounce { transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease; }
        .btn-bounce:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-brand-cream text-gray-800 min-h-screen">
    <nav class="bg-brand-cream/95 border-b-4 border-brand-purple/10">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <span class="font-boogaloo text-2xl sm:text-3xl text-brand-purple">The Kid Coding</span>
                <span class="font-boogaloo text-2xl sm:text-3xl text-brand-coral">Class</span>
            </a>
            <a href="index.html#pricing" class="font-bold text-brand-purple hover:text-brand-coral transition-colors">Back to Pricing</a>
        </div>
    </nav>

    <main class="py-16 lg:py-24">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 grid lg:grid-cols-[0.9fr_1.1fr] gap-10 items-start">
            <section class="bg-white rounded-[2rem] border-4 border-brand-coral/20 p-8 shadow-xl">
                <span class="inline-block px-4 py-1.5 bg-brand-coral/10 text-brand-coral font-bold rounded-full text-sm mb-5">Family discount</span>
                <h1 class="font-boogaloo text-5xl sm:text-6xl text-brand-purple mb-5">Add a sibling</h1>
                <p class="text-lg text-gray-600 leading-relaxed mb-6">Add a second child from the same household to the same live cohort.</p>
                <div class="rounded-2xl bg-brand-cream p-5 border-3 border-brand-yellow">
                    <p class="font-bold text-brand-dark text-lg">Sibling Add-On</p>
                    <p class="text-4xl font-bold text-brand-dark mt-1">$147</p>
                    <p class="text-gray-600 mt-2">Same household, same live cohort.</p>
                </div>
            </section>

            <section class="bg-brand-purple rounded-[2rem] border-4 border-brand-purple p-8 sm:p-10 shadow-2xl">
                <h2 class="font-boogaloo text-4xl text-white mb-2">Sibling details</h2>
                <p class="text-white/80 mb-8">Tell us about both students so we can keep them together.</p>

                <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-5">
                    <input type="hidden" name="interest" value="Sibling Add-On">
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label for="parent-name" class="block text-white font-semibold mb-2">Parent's Name</label>
                            <input type="text" id="parent-name" name="parent_name" required class="w-full px-5 py-4 rounded-xl border-3 border-white/30 bg-white/10 text-white placeholder-white/50 focus:outline-none focus:border-brand-yellow" placeholder="Jane Smith">
                        </div>
                        <div>
                            <label for="email" class="block text-white font-semibold mb-2">Email Address</label>
                            <input type="email" id="email" name="email" required class="w-full px-5 py-4 rounded-xl border-3 border-white/30 bg-white/10 text-white placeholder-white/50 focus:outline-none focus:border-brand-yellow" placeholder="jane@example.com">
                        </div>
                    </div>
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label for="first-student" class="block text-white font-semibold mb-2">Current Student</label>
                            <input type="text" id="first-student" name="current_student" required class="w-full px-5 py-4 rounded-xl border-3 border-white/30 bg-white/10 text-white placeholder-white/50 focus:outline-none focus:border-brand-yellow" placeholder="Alex">
                        </div>
                        <div>
                            <label for="sibling-name" class="block text-white font-semibold mb-2">Sibling Name</label>
                            <input type="text" id="sibling-name" name="sibling_name" required class="w-full px-5 py-4 rounded-xl border-3 border-white/30 bg-white/10 text-white placeholder-white/50 focus:outline-none focus:border-brand-yellow" placeholder="Sam">
                        </div>
                    </div>
                    <div>
                        <label for="sibling-age" class="block text-white font-semibold mb-2">Sibling Age</label>
                        <input type="number" id="sibling-age" name="sibling_age" min="9" max="17" required class="w-full px-5 py-4 rounded-xl border-3 border-white/30 bg-white/10 text-white placeholder-white/50 focus:outline-none focus:border-brand-yellow" placeholder="12">
                    </div>
                    <button type="submit" class="btn-bounce w-full px-10 py-4 bg-brand-yellow text-brand-dark font-bold text-lg rounded-2xl border-4 border-brand-yellow hover:bg-white hover:border-white">
                        Add Sibling
                    </button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
