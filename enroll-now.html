<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll Now | The Kid Coding Class</title>
    <meta name="description" content="Enroll your child in The Kid Coding Class full course.">
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
    <link rel="apple-touch-icon" href="assets/logo-mark.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'boogaloo': ['Boogaloo', 'cursive'],
                        'quicksand': ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        'brand-purple': '#7F77DD',
                        'brand-coral': '#D85A30',
                        'brand-yellow': '#FAC765',
                        'brand-teal': '#1D9E75',
                        'brand-cream': '#FFF9F0',
                        'brand-dark': '#2D2A4A',
                    }
                }
            }
        }
    </script>
    <style>
        .form-control {
            background: rgba(255, 249, 240, 0.6);
            border: 3px solid #7F77DD;
            box-shadow: inset 0 1px 3px rgba(45, 42, 74, 0.08);
        }
        .form-control:focus {
            border-color: #2D2A4A;
            box-shadow: 0 0 0 4px rgba(127, 119, 221, 0.28), inset 0 1px 3px rgba(45, 42, 74, 0.08);
            outline: none;
        }
    </style>
</head>
<body class="font-quicksand bg-brand-cream text-gray-800 min-h-screen">
    <main class="min-h-screen py-12 px-4">
        <div class="max-w-3xl mx-auto">
            <div class="flex items-center justify-between gap-4 mb-8">
                <a href="index.html" class="inline-flex items-center">
                    <img src="assets/logo-full.svg" alt="The Kid Coding Class" class="h-16 sm:h-20 w-auto">
                </a>
                <a href="index.html#pricing" class="inline-flex items-center text-brand-purple font-bold hover:underline">&larr; Back to pricing</a>
            </div>

            <section class="bg-white rounded-[2rem] border-4 border-brand-purple shadow-2xl overflow-hidden">
                <div class="bg-brand-purple px-6 sm:px-10 py-8 text-white">
                    <span class="inline-block px-4 py-1.5 bg-brand-yellow text-brand-dark font-bold rounded-full text-sm mb-4">Full Course</span>
                    <h1 class="font-boogaloo text-4xl sm:text-6xl mb-3">Enroll Now!</h1>
                    <p class="text-lg text-white/85">Save a seat in the complete 6-week live course.</p>
                </div>

                <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="p-6 sm:p-10 space-y-6">
                    <input type="hidden" name="interest" value="Full Course">

                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label for="parent-name" class="block font-bold text-brand-dark mb-2">Parent's Name</label>
                            <input type="text" id="parent-name" name="parent_name" required class="form-control w-full px-5 py-4 rounded-xl" placeholder="Jane Smith">
                        </div>
                        <div>
                            <label for="email" class="block font-bold text-brand-dark mb-2">Email Address</label>
                            <input type="email" id="email" name="email" required class="form-control w-full px-5 py-4 rounded-xl" placeholder="jane@example.com">
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4">
                        <div>
                            <label for="student-name" class="block font-bold text-brand-dark mb-2">Student's Name</label>
                            <input type="text" id="student-name" name="student_name" required class="form-control w-full px-5 py-4 rounded-xl" placeholder="Alex">
                        </div>
                        <div>
                            <label for="student-age" class="block font-bold text-brand-dark mb-2">Student's Age</label>
                            <input type="number" id="student-age" name="student_age" min="9" max="17" required class="form-control w-full px-5 py-4 rounded-xl" placeholder="12">
                        </div>
                    </div>

                    <div>
                        <label for="track" class="block font-bold text-brand-dark mb-2">Track</label>
                        <select id="track" name="track" required class="form-control w-full px-5 py-4 rounded-xl">
                            <option value="">Choose a track</option>
                            <option value="Junior Builders">Junior Builders (Ages 9-12)</option>
                            <option value="Teen Founders">Teen Founders (Ages 13-17)</option>
                        </select>
                    </div>

                    <div>
                        <label for="charter" class="block font-bold text-brand-dark mb-2">Charter or homeschool program</label>
                        <input type="text" id="charter" name="charter_program" class="form-control w-full px-5 py-4 rounded-xl" placeholder="Optional">
                    </div>

                    <button type="submit" class="w-full sm:w-auto px-10 py-4 bg-brand-yellow text-brand-dark font-bold text-lg rounded-2xl border-4 border-brand-yellow shadow-xl hover:bg-white transition-colors">
                        Enroll Now
                    </button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
