<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Access — The Kid Coding Class</title>
    <meta name="description" content="Get self-paced access to The Kid Coding Class lessons for your family.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'boogaloo': ['Boogaloo', 'cursive'],
                        'quicksand': ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        'brand-purple': '#7F77DD',
                        'brand-coral': '#D85A30',
                        'brand-yellow': '#FAC765',
                        'brand-teal': '#1D9E75',
                        'brand-cream': '#FFF9F0',
                        'brand-dark': '#2D2A4A',
                    }
                }
            }
        }
    </script>
</head>
<body class="font-quicksand bg-brand-cream text-gray-800 min-h-screen">
    <main class="min-h-screen py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-3xl mx-auto">
            <a href="index.html#pricing" class="inline-flex items-center text-brand-purple font-bold hover:text-brand-coral transition-colors mb-8">&larr; Back to pricing</a>

            <section class="bg-white rounded-[2rem] border-4 border-brand-teal/30 shadow-2xl overflow-hidden">
                <div class="bg-brand-teal p-8 sm:p-10 text-white">
                    <span class="inline-block px-4 py-1.5 bg-white/20 rounded-full font-bold text-sm mb-4">Self-Paced</span>
                    <h1 class="font-boogaloo text-4xl sm:text-6xl mb-4">Get Access</h1>
                    <p class="text-xl text-white/90">Get lifetime lesson access for the whole family and start learning on your schedule.</p>
                </div>

                <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="p-8 sm:p-10 space-y-6">
                    <input type="hidden" name="interest" value="Self-Paced Access">

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label for="parent-name" class="block font-bold text-brand-dark mb-2">Parent's Name</label>
                            <input type="text" id="parent-name" name="parent_name" required class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal" placeholder="Jane Smith">
                        </div>
                        <div>
                            <label for="email" class="block font-bold text-brand-dark mb-2">Email Address</label>
                            <input type="email" id="email" name="email" required class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal" placeholder="jane@example.com">
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label for="student-name" class="block font-bold text-brand-dark mb-2">Student's Name</label>
                            <input type="text" id="student-name" name="student_name" required class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal" placeholder="Avery">
                        </div>
                        <div>
                            <label for="student-age" class="block font-bold text-brand-dark mb-2">Student's Age</label>
                            <input type="number" id="student-age" name="student_age" min="9" max="17" required class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal" placeholder="12">
                        </div>
                    </div>

                    <div>
                        <label for="preferred-track" class="block font-bold text-brand-dark mb-2">Preferred Track</label>
                        <select id="preferred-track" name="preferred_track" required class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal">
                            <option value="">Choose a track</option>
                            <option>Junior Builders (Ages 9-12)</option>
                            <option>Teen Founders (Ages 13-17)</option>
                            <option>Both tracks</option>
                        </select>
                    </div>

                    <div>
                        <label for="notes" class="block font-bold text-brand-dark mb-2">Anything we should know?</label>
                        <textarea id="notes" name="notes" rows="4" class="w-full px-5 py-4 rounded-xl border-3 border-gray-200 bg-brand-cream font-medium focus:outline-none focus:border-brand-teal" placeholder="Tell us about your student's goals."></textarea>
                    </div>

                    <button type="submit" class="w-full sm:w-auto px-10 py-4 bg-brand-teal text-white font-bold text-lg rounded-2xl border-4 border-brand-teal shadow-xl hover:bg-brand-purple hover:border-brand-purple transition-colors">
                        Get Access
                    </button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
