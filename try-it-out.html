<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try It Out — The Kid Coding Class</title>
    <meta name="description" content="Book a drop-in coding class for your child.">
    <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg">
    <link rel="apple-touch-icon" href="assets/logo-mark.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'boogaloo': ['Boogaloo', 'cursive'],
                        'quicksand': ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        'brand-purple': '#7F77DD',
                        'brand-coral': '#D85A30',
                        'brand-yellow': '#FAC765',
                        'brand-teal': '#1D9E75',
                        'brand-cream': '#FFF9F0',
                        'brand-dark': '#2D2A4A',
                    }
                }
            }
        }
    </script>
    <style>
        .form-field {
            border: 3px solid #7F77DD;
            box-shadow: inset 0 0 0 1px rgba(127, 119, 221, 0.18), 0 1px 2px rgba(45, 42, 74, 0.08);
        }
        .form-field:focus {
            border-color: #7F77DD;
            box-shadow: 0 0 0 4px rgba(127, 119, 221, 0.24), 0 1px 2px rgba(45, 42, 74, 0.08);
            outline: none;
        }
    </style>
</head>
<body class="font-quicksand bg-brand-cream text-gray-800 min-h-screen">
    <main class="min-h-screen py-12 sm:py-16 px-4">
        <div class="max-w-3xl mx-auto">
            <div class="flex items-center justify-between gap-4 mb-8">
                <a href="index.html" aria-label="The Kid Coding Class home">
                    <img src="assets/logo-full.svg" alt="The Kid Coding Class" class="h-20 sm:h-24 w-auto">
                </a>
                <a href="index.html#pricing" class="inline-flex items-center text-brand-purple font-bold hover:underline">&larr; Back to pricing</a>
            </div>

            <section class="bg-white rounded-[2rem] border-4 border-brand-purple/20 shadow-xl overflow-hidden">
                <div class="bg-brand-purple text-white p-8 sm:p-10">
                    <span class="inline-block px-4 py-1.5 bg-white/20 rounded-full font-bold text-sm mb-4">Drop-In Class · $47</span>
                    <h1 class="font-boogaloo text-4xl sm:text-5xl mb-3">TRY IT OUT</h1>
                    <p class="text-white/85 text-lg">Tell us about your student and we will send the next available 90-minute drop-in class options.</p>
                </div>

                <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="p-8 sm:p-10 space-y-6">
                    <input type="hidden" name="request_type" value="Try It Out - Drop-In Class">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label for="parent-name" class="block font-bold text-brand-dark mb-2">Parent's Name</label>
                            <input id="parent-name" name="parent_name" type="text" required placeholder="Jane Smith" class="form-field w-full px-5 py-4 rounded-xl bg-white">
                        </div>
                        <div>
                            <label for="email" class="block font-bold text-brand-dark mb-2">Email Address</label>
                            <input id="email" name="email" type="email" required placeholder="jane@example.com" class="form-field w-full px-5 py-4 rounded-xl bg-white">
                        </div>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label for="student-name" class="block font-bold text-brand-dark mb-2">Student's Name</label>
                            <input id="student-name" name="student_name" type="text" required placeholder="Avery" class="form-field w-full px-5 py-4 rounded-xl bg-white">
                        </div>
                        <div>
                            <label for="student-age" class="block font-bold text-brand-dark mb-2">Student Age</label>
                            <input id="student-age" name="student_age" type="number" min="9" max="17" required placeholder="12" class="form-field w-full px-5 py-4 rounded-xl bg-white">
                        </div>
                    </div>

                    <div>
                        <label for="track" class="block font-bold text-brand-dark mb-2">Preferred Track</label>
                        <select id="track" name="preferred_track" required class="form-field w-full px-5 py-4 rounded-xl bg-white">
                            <option value="">Choose a track</option>
                            <option>Junior Builders (Ages 9-12)</option>
                            <option>Teen Founders (Ages 13-17)</option>
                            <option>Not sure yet</option>
                        </select>
                    </div>

                    <div>
                        <label for="availability" class="block font-bold text-brand-dark mb-2">Best Days or Times</label>
                        <textarea id="availability" name="availability" rows="4" placeholder="Weekday afternoons, Saturdays, etc." class="form-field w-full px-5 py-4 rounded-xl bg-white"></textarea>
                    </div>

                    <button type="submit" class="w-full sm:w-auto px-10 py-4 bg-brand-coral text-white font-bold text-lg rounded-2xl border-4 border-brand-coral shadow-xl hover:bg-brand-purple hover:border-brand-purple transition-colors">Send Drop-In Options</button>
                </form>
            </section>
        </div>
    </main>
</body>
</html>
